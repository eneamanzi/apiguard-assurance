# config.yaml — APIGuard Assurance configuration template
# Credentials must NEVER be written in plain text here.
# All ${...} placeholders are resolved from environment variables by loader.py.

target:
  base_url: "http://localhost:8000"
  #openapi_spec_url: "http://localhost:3000/swagger.v1.json"   # Forma 1 — URL
  openapi_spec_path: "./specs/forgejo-swagger.v1.json"        # Forma 2 — path locale
  admin_api_url: "http://localhost:8001"

credentials:
  admin_username: "${ADMIN_USERNAME}"
  admin_password: "${ADMIN_PASSWORD}"
  user_a_username: "${USER_A_USERNAME}"
  user_a_password: "${USER_A_PASSWORD}"
  user_b_username: "${USER_B_USERNAME}"
  user_b_password: "${USER_B_PASSWORD}"

execution:
  min_priority: 3       # esegue solo i test con priorità <= a quella specificata
                        # 0 = solo P0 | 1 = P0+P1 | 2 = P0-P2 | 3 = tutti (default)
  strategies:
    - BLACK_BOX
    - GREY_BOX
    - WHITE_BOX
  test_ids: []     # esegue solo test specificati, se vuota comportamento normale
  # test_ids: ["0.1", "1.1"]  # più test specifici
  # test_ids: []          # lista vuota = comportamento normale

  fail_fast: false      # Se true, interrompe l'esecuzione al primo FAIL su test P0
  connect_timeout: 5.0
  read_timeout: 30.0
  max_retry_attempts: 3
  openapi_fetch_timeout_seconds: 60.0

# Output directory for assessment results.
# Both evidence.json and assessment_report.html are written here.
# Accepts relative paths (from the working directory) or absolute paths.
# The directory is created automatically if it does not exist.
output:
  directory: "outputs"

rate_limit_probe:
  max_requests: 150
  request_interval_ms: 50

tests:
  # Per-domain test tuning parameters.
  # Default values (shown below) produce a complete assessment.
  # Override only when strictly necessary (e.g. rate-limited environments).
  domain_1:
    # Test 1.1 — Authentication Required
    # 0 = test ALL protected endpoints (recommended for academic completeness).
    # Set to a positive integer to cap the scan on rate-limited targets.
    max_endpoints_cap: 0