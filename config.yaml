# config.yaml — APIGuard Assurance configuration template
# Credentials must NEVER be written in plain text here.
# All ${...} placeholders are resolved from environment variables by loader.py.

target:
  base_url: "http://localhost:8000"
  openapi_spec_url: "http://localhost:3000/swagger.v1.json"   # Forma 1 — URL
  #openapi_spec_path: "./specs/forgejo-swagger.v1.json"        # Forma 2 — path locale
  admin_api_url: "http://localhost:8001"

  # ---------------------------------------------------------------------------
  # path_seed — context-aware path parameter seeding (optional)
  # ---------------------------------------------------------------------------
  # Maps OpenAPI path parameter names to real resource identifiers on the target.
  #
  # WHY THIS MATTERS:
  #   Parametric endpoints like /api/v1/repos/{owner}/{repo}/issues resolve to
  #   /api/v1/repos/1/1/issues with the generic fallback placeholder. The backend
  #   returns 404 before the request reaches the authentication middleware, making
  #   the probe result INCONCLUSIVE_PARAMETRIC instead of ENFORCED or BYPASS.
  #   Real values route the probe to an existing resource, ensuring the auth
  #   layer fires and the test produces meaningful results.
  #
  # HOW TO POPULATE:
  #   Run: apiguard generate-seed <openapi_spec_url_or_path> --output seed.yaml
  #   This command reads the spec, extracts all {param} names, and generates a
  #   template with FILL_ME placeholders. Replace each FILL_ME with a real value
  #   from your target deployment and paste the block here.
  #
  # EXAMPLE (Forgejo):
  #   path_seed:
  #     owner: "mario_rossi"          # A real Forgejo username
  #     repo: "my-test-repo"          # A real repository belonging to that user
  #     username: "mario_rossi"       # Same user (aliased under different param name)
  #     id: "1"                       # Generic integer ID for issue/comment/etc.
  #     index: "1"                    # Issue index within a repository
  #     sha: "main"                   # A real branch name or commit SHA
  #
  # FALLBACK BEHAVIOUR:
  #   Parameters absent from path_seed fall back to the test's default placeholder
  #   ("1" for most probes, "apiguard-probe" for parametric DELETE probes).
  #   An empty dict {} preserves the pre-seed behaviour entirely.
  path_seed: {
    # === CORE ===
    owner: "user-a",
    username: "user-a",
    user: "user-a",
    repo: "test-repo",
    repo_name: "test-repo",

    # === IDs NUMERICI ===
    "user-id": "2",
    "repository-id": "1",
    id: "1",          

    # === ORGANIZZAZIONE (da creare in Forgejo) ===
    org: "test-org",   # {org} != {owner}

    # === GIT ===
    branch: "main",
    ref: "main",
    sha: "52407ec34d313f5550ee4d7df1b41865df812eba",
    filepath: "README.md",
    archive: "main.tar.gz",

    # === ALTRI ===
    name: "MIT",
    index: "1",        # issue index (dopo aver creato un'issue)
    tag: "v0.1.0",
    comment: "1",
    team: "1",         # dopo aver creato un team nell'org

    # === PARAMETRI AVANZATI (spesso feature disabilitate) ===
    "activity-id": "1",
    "attachment_id": "1",
    "run_id": "1",
    task: "1",
    secretname: "MY_SECRET",
    variablename: "MY_VAR",
    workflowfilename: "main.yml",
    quotagroup: "default",
    quotarule: "default",
    token: "1",
    version: "1.0.0",
    pageName: "Home",
    basehead: "main...main",
    base: "main",
    head: "main",
    diffType: "diff",
    flag: "fork",
    collaborator: "user-b",
    target: "user-b",
    identifier: "1",
    position: "1",
    type: "gitea",
    template_owner: "user-a",
    template_repo: "test-repo",
    topic: "forgejo",
  }

credentials:
  admin_username: "${ADMIN_USERNAME}"
  admin_password: "${ADMIN_PASSWORD}"
  user_a_username: "${USER_A_USERNAME}"
  user_a_password: "${USER_A_PASSWORD}"
  user_b_username: "${USER_B_USERNAME}"
  user_b_password: "${USER_B_PASSWORD}"

execution:
  min_priority: 3       # esegue solo i test con priorità <= a quella specificata
                        # 0 = solo P0 | 1 = P0+P1 | 2 = P0-P2 | 3 = tutti (default)
  strategies:
    - BLACK_BOX
    - GREY_BOX
    - WHITE_BOX
  test_ids: []     # esegue solo test specificati, se vuota comportamento normale
  # test_ids: ["0.1", "1.1"]  # più test specifici
  # test_ids: []          # lista vuota = comportamento normale

  fail_fast: false      # Se true, interrompe l'esecuzione al primo FAIL su test P0
  connect_timeout: 5.0
  read_timeout: 30.0
  max_retry_attempts: 3
  openapi_fetch_timeout_seconds: 60.0

# Output directory for assessment results.
# Both evidence.json and assessment_report.html are written here.
# Accepts relative paths (from the working directory) or absolute paths.
# The directory is created automatically if it does not exist.
output:
  directory: "outputs"

tests:
  # Per-domain test tuning parameters.
  # Default values (shown below) produce a complete assessment.
  # Override only when strictly necessary (e.g. rate-limited environments).
  domain_1:
    # Test 1.1 — Authentication Required
    # Nested under tests.domain_1.test_1_1 in schema.
    test_1_1:
      # 0 = test ALL protected endpoints (recommended for academic completeness).
      # Set to a positive integer to cap the scan on rate-limited targets.
      max_endpoints_cap: 0

  domain_4:
    # Test 4.1 — Rate Limiting (BLACK_BOX, P0)
    # Empirical probe parameters: how many requests to send and at what
    # interval before concluding that rate limiting is absent.
    # Conservative defaults avoid triggering security alerts on the target.
    # Increase max_requests only on targets with very high rate-limit thresholds
    # (e.g. 1000 req/min) that the default budget of 150 would not reach.
    test_4_1:
      max_requests: 150           # probe budget before declaring rate limit absent
      request_interval_ms: 50    # ms between requests — full probe <= 7.5 s

    # Test 4.2 — Timeout Configuration Audit (WHITE_BOX, P1)
    # Oracle thresholds from the methodology (section 4.2, NIST SP 800-204A Section 4.3).
    # Kong stores all timeout values as plain integers in milliseconds.
    test_4_2:
      max_connect_timeout_ms: 5000    # <= 5 s — methodology oracle
      max_read_timeout_ms: 30000      # <= 30 s — methodology oracle
      max_write_timeout_ms: 30000     # <= 30 s — methodology oracle

    # Test 4.3 — Circuit Breaker Configuration Audit (WHITE_BOX, P1)
    # Dual-Check a 3 Livelli:
    #   LEVEL 1 (Native): cerca il plugin nativo nella lista accepted_cb_plugin_names.
    #            Se trovato e configurato entro soglia -> PASS (Full Guarantee).
    #   LEVEL 2 (Compensating Control): se nessun plugin nativo, verifica che almeno
    #            un upstream Kong implementi healthchecks.passive con soglie sicure.
    #            Se sì -> PASS con Finding informativo sul controllo compensativo.
    #   LEVEL 3 (Vulnerable): né plugin né upstream con passive healthcheck -> FAIL.
    #   Finding Separato (Observability): verifica /status per metriche CB (sempre,
    #            indipendente dallo status del test).
    #
    # NOTE: 'response-ratelimiting' è INTENZIONALMENTE ESCLUSO da accepted_cb_plugin_names.
    # Gestisce volumi di richiesta, NON i cascading failure: non implementa la macchina
    # a stati CLOSED/OPEN/HALF-OPEN e non rileva degradazione del downstream.
    test_4_3:
      # LEVEL 1 — Plugin nativo (solo veri circuit breaker).
      # 'circuit-breaker' è Kong Enterprise only: su Kong OSS questo livello fallirà
      # sempre, spostando la verifica al Livello 2 (compensating control).
      accepted_cb_plugin_names:
        - "circuit-breaker"

      # LEVEL 1 — Parameter ranges (methodology section 4.3, Martin Fowler CB Pattern).
      failure_threshold_min: 3        # min consecutive failures to open the circuit
      failure_threshold_max: 10       # max consecutive failures to open the circuit
      timeout_duration_min_seconds: 30   # min Open-state duration before Half-Open probe
      timeout_duration_max_seconds: 120  # max Open-state duration before Half-Open probe

      # LEVEL 2 — Passive healthcheck compensating control oracle thresholds.
      # Un upstream è considerato "con controllo compensativo valido" se almeno un
      # contatore di failure è > 0 (passive HC abilitato) e <= il massimo configurato.
      # Kong default: tutti i contatori = 0 (passive HC disabilitato).
      passive_hc_max_http_failures: 10   # unhealthy.http_failures: accettabile in [1, 10]
      passive_hc_max_tcp_failures: 10    # unhealthy.tcp_failures: accettabile in [1, 10]
      passive_hc_max_timeouts: 10        # unhealthy.timeouts: accettabile in [1, 10]

  domain_6:
    # Test 6.2 — Security Header Configuration Audit (WHITE_BOX, P3)
    # Verifies presence and correctness of HTTP security headers on the target.
    # No Admin API access required: checks are performed via regular GET requests.
    # Checked headers: Strict-Transport-Security, X-Content-Type-Options,
    #   X-Frame-Options, Content-Security-Policy, Permissions-Policy.
    # Leaky headers flagged: X-Powered-By, Server (if version-bearing).
    test_6_2:
      # Minimum acceptable max-age in the Strict-Transport-Security header.
      # ASVS V3.4.1 requires max-age >= 31536000 (1 year).
      hsts_min_max_age_seconds: 31536000

      # Number of endpoints to sample for cross-endpoint header consistency check.
      # 0 = all endpoints (complete coverage, slower on large OpenAPI specs).
      # Any positive integer caps the sample using the first N AttackSurface entries.
      endpoint_sample_size: 5

    # ---------------------------------------------------------------------------
    # Test 6.4 — Hardcoded Credentials Audit (WHITE_BOX, P2)
    # ---------------------------------------------------------------------------
    # Verifies that service credentials are not exposed via debug/actuator endpoints
    # or hardcoded in Kong service URLs and plugin configuration.
    #
    # Sub-test A (always runs): probes each path below with unauthenticated GET.
    #   Oracle: desired outcome is 401/403/404.
    #          A 2xx response whose body matches a credential pattern is a FAIL.
    #
    # Sub-test B (runs only when target.admin_api_url is configured): scans Kong
    #   service URLs and plugin configs via the Admin API.
    #   Oracle: any credential pattern found in service URL or plugin config is a FAIL.
    #
    # References: OWASP ASVS V13.3.1, CWE-798, NIST SP 800-53 IA-5(1).
    test_6_4:
      # Substring present in the response body of a non-2xx reply produced by the
      # Gateway itself (deny-by-default), used to distinguish oracle states
      # ENDPOINT_BLOCKED (Gateway) from ENDPOINT_BLOCKED_BY_APP (application).
      # Default is specific to Kong DB-less 3.x.
      # Override for other gateways:
      #   Traefik:          "404 page not found"
      #   AWS API Gateway:  "Missing Authentication Token"
      #   Nginx:            "<title>404 Not Found</title>"
      #   HAProxy:          "503 Service Unavailable"
      # Set to "" (empty string) to disable the distinction entirely.
      gateway_block_body_fragment: "no Route matched with those values"

      # List of paths probed for debug/actuator endpoint exposure (Sub-test A).
      # Each path is probed with an unauthenticated GET request.
      # Extend this list with paths specific to your application stack.
      # Examples for other stacks:
      #   Laravel Telescope:    /_ignition/health-check
      #   Django Silk:          /silk/summary/
      #   Rails info:           /rails/info/properties
      #   Node inspect:         /inspect
      debug_endpoint_paths:
        # --- Paths routed through Kong (/api prefix) ---
        # These are the only paths that can reach Forgejo through this Kong setup.
        # Kong routes only /api/* to Forgejo; all other paths return 404 from Kong.
        - /api/v1/settings/api    # Forgejo: public server settings endpoint (no auth required)
        - /api/debug/config       # Generic: custom internal config dump under API prefix
        - /api/debug/users        # Generic: internal debug endpoint under API prefix

        # --- Paths NOT routed by Kong (Kong returns 404 directly) ---
        # These verify Kong deny-by-default for common debug paths.
        # They do NOT test Forgejo itself — they test whether Kong leaks
        # debug endpoints that should be blocked at the gateway layer.
        # Useful for future deployments with different routing configurations.
        - /actuator/env           # Spring Boot: exposes environment variables including secrets
        - /actuator/configprops   # Spring Boot: exposes all @ConfigurationProperties values
        - /actuator/health        # Spring Boot: may expose DB/broker connection details
        - /debug/vars             # Go net/http/pprof: exposes all runtime vars
        - /debug/pprof            # Go: profiling endpoint, may expose heap dumps
        - /api/config             # Generic: common custom config dump path
        - /admin/config           # Generic: admin config dump
        - /_debug                 # Generic: custom debug page

domain_7:
    # ---------------------------------------------------------------------------
    # Test 7.2 -- SSRF Prevention (GREY_BOX, P0)
    # ---------------------------------------------------------------------------
    # Verifies that the Forgejo webhook creation endpoint rejects user-controlled
    # URLs targeting internal infrastructure (cloud metadata, private IPs,
    # encoding-obfuscated loopback addresses, forbidden protocol schemes).
    #
    # Injection vector: POST /api/v1/repos/{owner}/{repo}/hooks
    #   The SSRF URL is placed in the webhook body's 'config.url' field.
    #   A 201 response means the URL was accepted without validation (FAIL).
    #   A 4xx response means the URL was rejected (PASS).
    #
    # References: OWASP API7:2023, CWE-918, OWASP ASVS v5.0.0 V1.3.6,
    #             NIST SP 800-204 Section 3.2.2, methodology section 7.2.
    test_7_2:
      # Payload categories to include in the SSRF probe.
      # All six categories are enabled by default for maximum coverage.
      # Remove a category to narrow the probe scope (the omitted sub-test
      # is not reported as SKIP -- the category is simply not probed).
      payload_categories:
        - cloud_metadata      # Sub-test A: AWS EC2/ECS, GCP, Azure, DigitalOcean IMDS
        - private_ip          # Sub-test B: RFC-1918 and loopback IP addresses
        - encoding_bypass     # Sub-test C: decimal/hex/octal/IPv6/URL-encoded loopback
                              #             + cloud IMDS IP encoding variants
                              #             + AWS IMDSv2 IPv6 (fd00:ec2::254)
        - forbidden_protocol  # Sub-test D: file://, gopher://, dict://, ftp://, ldap://
        - dns_bypass          # Sub-test E: nip.io / sslip.io wildcard DNS bypass
        - url_parser_confusion # Sub-test F: @ authority ambiguity (Orange Tsai 2017)

      # Injection vector configuration.
      # Controls which endpoint receives the SSRF URL and how the request body
      # is constructed.  Default: Forgejo webhook creation endpoint.
      # Change these to adapt the test to a different target API without
      # touching Python source code.
      #
      # injection_mode: 'forgejo_webhook' creates an assessment repository
      #   before probing and uses {owner}/{repo} placeholders in the path.
      #   'fixed_path' probes injection_path_template directly.
      injection_mode: "forgejo_webhook"
      injection_path_template: "/api/v1/repos/{owner}/{repo}/hooks"
      injection_url_field: "config.url"  # dot-notation path in the body template
      injection_body_template:
        type: "forgejo"
        config:
          url: "$SSRF_URL$"        # substituted at runtime with each payload URL
          content_type: "json"
          secret: "$RANDOM_SECRET$" # substituted with secrets.token_hex(16)
        events:
          - "push"
        active: false             # prevents webhook from firing on real events
        branch_filter: "*"

      # URL of an operator-controlled public server that responds with
      # 302 Location pointing to an internal SSRF target.
      # When non-empty, sub-test E (redirect-following SSRF) is executed.
      # When empty, sub-test E is skipped with an InfoNote in the report.
      # The server must be reachable from the test runner's network and must
      # be under your control. Do not use a production server.
      # Example: "http://my-redirect-server.example.com/to-aws-metadata"
      ssrf_redirect_server_url: ""

      # Case-insensitive substrings checked against non-2xx SSRF probe response
      # bodies BEFORE ssrf_block_response_keywords to detect URLs rejected due
      # to syntactic invalidity at the HTTP parser level -- NOT due to an explicit
      # SSRF IP/scheme validation.
      #
      # A match classifies the oracle state as SSRF_BLOCKED_AS_MALFORMED_URL in
      # the HTML Audit Trail, distinguishing accidental parser rejection from a
      # deliberate SSRF defence.  No Finding is produced in either case.
      #
      # Example: Go's net/url rejects "http://%31%32%37%2e%30%2e%30%2e%31"
      # with "invalid character" because percent-encoded octets are not valid in
      # a URL host component (RFC 3986).  This is a parser side-effect, not an
      # SSRF-aware block; classifying it as SSRF_BLOCKED_BY_VALIDATION would
      # overstate the application's defensive posture in the report.
      # Case-insensitive keywords checked FIRST (Level 1) against the
      # response body to detect URLs rejected because they are syntactically
      # invalid per RFC 3986 (malformed host, percent-encoded host octets,
      # etc.).  A match produces oracle state SSRF_BLOCKED_AS_MALFORMED_URL.
      # Note: 'invalid url' is intentionally excluded here -- it is also
      # returned by Forgejo for unsupported schemes, and the Level 2 check
      # (scheme inspection + unsupported_scheme_keywords) handles that case.
      ssrf_malformed_url_keywords:
        - "invalid character"   # Go net/url: invalid char in host/path (e.g. percent-encoded host)
        - "invalid url"         # Forgejo/Go: generic parse failure -- safe here because the
                                # scheme check (Level 1) runs before this list and already
                                # handled non-HTTP schemes (file://, gopher://, etc.)
        - "url malformed"       # variation used by some HTTP frameworks
        - "malformed url"       # alternate word order
        - "parse error"         # generic URL parse failure
        - "url parse"           # Go net/url error prefix
        - "could not parse"     # validation framework messages
        - "bad url"             # nginx / proxy error variants

      # Case-insensitive keywords checked FIRST (Level 1) against the response
      # body to detect URLs rejected because their scheme is not supported by
      # the application (file://, gopher://, dict://, etc.).
      # A match produces oracle state SSRF_BLOCKED_UNSUPPORTED_SCHEME.
      #
      # The test checks the injected URL's scheme DIRECTLY (via urllib.parse)
      # as the primary Level 1 check -- these keywords are a fallback for
      # application stacks that emit more descriptive error messages than
      # Forgejo's generic "Invalid url".
      ssrf_unsupported_scheme_keywords:
        - "scheme not supported"
        - "scheme not allowed"
        - "unsupported scheme"
        - "unsupported protocol"
        - "invalid scheme"
        - "only http"
        - "only https"
        - "protocol not allowed"

      # Case-insensitive substrings checked against non-2xx SSRF probe response
      # bodies to classify the oracle state as SSRF_BLOCKED_BY_VALIDATION
      # (explicit rejection) vs SSRF_BLOCKED_UNKNOWN (rejected, reason unclear).
      # Both states produce no Finding.
      # Override with Forgejo or gateway-specific error message fragments for
      # more precise Audit Trail classification.
      ssrf_block_response_keywords:
        - "invalid host"
        - "not allowed"
        - "forbidden"
        - "scheme not supported"
        - "scheme not allowed"
        - "host not allowed"
        - "private"
        - "loopback"
        - "blocked"
        - "disallowed"
        - "restricted"

      # Intended timeout in milliseconds for individual SSRF probe requests.
      # Reserved for future per-request timeout override support in SecurityClient.
      # Currently the global execution.read_timeout (30 s) governs all requests.
      # NIST SP 800-204 Section 3.2.2 recommends tight timeouts on outbound
      # connections from API servers.
      ssrf_request_timeout_ms: 10000