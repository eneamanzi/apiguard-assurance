# config.yaml — APIGuard Assurance configuration template
# Credentials must NEVER be written in plain text here.
# All ${...} placeholders are resolved from environment variables by loader.py.

target:
  base_url: "http://localhost:8000"
  openapi_spec_url: "http://localhost:3000/swagger.v1.json"   # Forma 1 — URL
  #openapi_spec_path: "./specs/forgejo-swagger.v1.json"        # Forma 2 — path locale
  admin_api_url: "http://localhost:8001"

  # ---------------------------------------------------------------------------
  # path_seed — context-aware path parameter seeding (optional)
  # ---------------------------------------------------------------------------
  # Maps OpenAPI path parameter names to real resource identifiers on the target.
  #
  # WHY THIS MATTERS:
  #   Parametric endpoints like /api/v1/repos/{owner}/{repo}/issues resolve to
  #   /api/v1/repos/1/1/issues with the generic fallback placeholder. The backend
  #   returns 404 before the request reaches the authentication middleware, making
  #   the probe result INCONCLUSIVE_PARAMETRIC instead of ENFORCED or BYPASS.
  #   Real values route the probe to an existing resource, ensuring the auth
  #   layer fires and the test produces meaningful results.
  #
  # HOW TO POPULATE:
  #   Run: apiguard generate-seed <openapi_spec_url_or_path> --output seed.yaml
  #   This command reads the spec, extracts all {param} names, and generates a
  #   template with FILL_ME placeholders. Replace each FILL_ME with a real value
  #   from your target deployment and paste the block here.
  #
  # EXAMPLE (Forgejo):
  #   path_seed:
  #     owner: "mario_rossi"          # A real Forgejo username
  #     repo: "my-test-repo"          # A real repository belonging to that user
  #     username: "mario_rossi"       # Same user (aliased under different param name)
  #     id: "1"                       # Generic integer ID for issue/comment/etc.
  #     index: "1"                    # Issue index within a repository
  #     sha: "main"                   # A real branch name or commit SHA
  #
  # FALLBACK BEHAVIOUR:
  #   Parameters absent from path_seed fall back to the test's default placeholder
  #   ("1" for most probes, "apiguard-probe" for parametric DELETE probes).
  #   An empty dict {} preserves the pre-seed behaviour entirely.
  path_seed: {
    # === CORE ===
    owner: "user-a",
    username: "user-a",
    user: "user-a",
    repo: "test-repo",
    repo_name: "test-repo",

    # === IDs NUMERICI ===
    "user-id": "2",
    "repository-id": "1",
    id: "1",          

    # === ORGANIZZAZIONE (da creare in Forgejo) ===
    org: "test-org",   # {org} != {owner}

    # === GIT ===
    branch: "main",
    ref: "main",
    sha: "52407ec34d313f5550ee4d7df1b41865df812eba",
    filepath: "README.md",
    archive: "main.tar.gz",

    # === ALTRI ===
    name: "MIT",
    index: "1",        # issue index (dopo aver creato un'issue)
    tag: "v0.1.0",
    comment: "1",
    team: "1",         # dopo aver creato un team nell'org

    # === PARAMETRI AVANZATI (spesso feature disabilitate) ===
    "activity-id": "1",
    "attachment_id": "1",
    "run_id": "1",
    task: "1",
    secretname: "MY_SECRET",
    variablename: "MY_VAR",
    workflowfilename: "main.yml",
    quotagroup: "default",
    quotarule: "default",
    token: "1",
    version: "1.0.0",
    pageName: "Home",
    basehead: "main...main",
    base: "main",
    head: "main",
    diffType: "diff",
    flag: "fork",
    collaborator: "user-b",
    target: "user-b",
    identifier: "1",
    position: "1",
    type: "gitea",
    template_owner: "user-a",
    template_repo: "test-repo",
    topic: "forgejo",
  }

credentials:
  admin_username: "${ADMIN_USERNAME}"
  admin_password: "${ADMIN_PASSWORD}"
  user_a_username: "${USER_A_USERNAME}"
  user_a_password: "${USER_A_PASSWORD}"
  user_b_username: "${USER_B_USERNAME}"
  user_b_password: "${USER_B_PASSWORD}"

execution:
  min_priority: 3       # esegue solo i test con priorità <= a quella specificata
                        # 0 = solo P0 | 1 = P0+P1 | 2 = P0-P2 | 3 = tutti (default)
  strategies:
    - BLACK_BOX
    - GREY_BOX
    - WHITE_BOX
  test_ids: []     # esegue solo test specificati, se vuota comportamento normale
  # test_ids: ["0.1", "1.1"]  # più test specifici
  # test_ids: []          # lista vuota = comportamento normale

  fail_fast: false      # Se true, interrompe l'esecuzione al primo FAIL su test P0
  connect_timeout: 5.0
  read_timeout: 30.0
  max_retry_attempts: 3
  openapi_fetch_timeout_seconds: 60.0

# Output directory for assessment results.
# Both evidence.json and assessment_report.html are written here.
# Accepts relative paths (from the working directory) or absolute paths.
# The directory is created automatically if it does not exist.
output:
  directory: "outputs"

tests:
  # Per-domain test tuning parameters.
  # Default values (shown below) produce a complete assessment.
  # Override only when strictly necessary (e.g. rate-limited environments).
  domain_1:
    # Test 1.1 — Authentication Required
    # Nested under tests.domain_1.test_1_1 in schema.
    test_1_1:
      # 0 = test ALL protected endpoints (recommended for academic completeness).
      # Set to a positive integer to cap the scan on rate-limited targets.
      max_endpoints_cap: 0

  domain_4:
    # Test 4.1 — Rate Limiting (BLACK_BOX, P0)
    # Empirical probe parameters: how many requests to send and at what
    # interval before concluding that rate limiting is absent.
    # Conservative defaults avoid triggering security alerts on the target.
    # Increase max_requests only on targets with very high rate-limit thresholds
    # (e.g. 1000 req/min) that the default budget of 150 would not reach.
    test_4_1:
      max_requests: 150           # probe budget before declaring rate limit absent
      request_interval_ms: 50    # ms between requests — full probe <= 7.5 s

    # Test 4.2 — Timeout Configuration Audit (WHITE_BOX, P1)
    # Oracle thresholds from the methodology (section 4.2, NIST SP 800-204A Section 4.3).
    # Kong stores all timeout values as plain integers in milliseconds.
    test_4_2:
      max_connect_timeout_ms: 5000    # <= 5 s — methodology oracle
      max_read_timeout_ms: 30000      # <= 30 s — methodology oracle
      max_write_timeout_ms: 30000     # <= 30 s — methodology oracle

    # Test 4.3 — Circuit Breaker Configuration Audit (WHITE_BOX, P1)
    # Dual-Check a 3 Livelli:
    #   LEVEL 1 (Native): cerca il plugin nativo nella lista accepted_cb_plugin_names.
    #            Se trovato e configurato entro soglia -> PASS (Full Guarantee).
    #   LEVEL 2 (Compensating Control): se nessun plugin nativo, verifica che almeno
    #            un upstream Kong implementi healthchecks.passive con soglie sicure.
    #            Se sì -> PASS con Finding informativo sul controllo compensativo.
    #   LEVEL 3 (Vulnerable): né plugin né upstream con passive healthcheck -> FAIL.
    #   Finding Separato (Observability): verifica /status per metriche CB (sempre,
    #            indipendente dallo status del test).
    #
    # NOTE: 'response-ratelimiting' è INTENZIONALMENTE ESCLUSO da accepted_cb_plugin_names.
    # Gestisce volumi di richiesta, NON i cascading failure: non implementa la macchina
    # a stati CLOSED/OPEN/HALF-OPEN e non rileva degradazione del downstream.
    test_4_3:
      # LEVEL 1 — Plugin nativo (solo veri circuit breaker).
      # 'circuit-breaker' è Kong Enterprise only: su Kong OSS questo livello fallirà
      # sempre, spostando la verifica al Livello 2 (compensating control).
      accepted_cb_plugin_names:
        - "circuit-breaker"

      # LEVEL 1 — Parameter ranges (methodology section 4.3, Martin Fowler CB Pattern).
      failure_threshold_min: 3        # min consecutive failures to open the circuit
      failure_threshold_max: 10       # max consecutive failures to open the circuit
      timeout_duration_min_seconds: 30   # min Open-state duration before Half-Open probe
      timeout_duration_max_seconds: 120  # max Open-state duration before Half-Open probe

      # LEVEL 2 — Passive healthcheck compensating control oracle thresholds.
      # Un upstream è considerato "con controllo compensativo valido" se almeno un
      # contatore di failure è > 0 (passive HC abilitato) e <= il massimo configurato.
      # Kong default: tutti i contatori = 0 (passive HC disabilitato).
      passive_hc_max_http_failures: 10   # unhealthy.http_failures: accettabile in [1, 10]
      passive_hc_max_tcp_failures: 10    # unhealthy.tcp_failures: accettabile in [1, 10]
      passive_hc_max_timeouts: 10        # unhealthy.timeouts: accettabile in [1, 10]

  domain_6:
    # Test 6.2 — Security Header Configuration Audit (WHITE_BOX, P3)
    # Verifies presence and correctness of HTTP security headers on the target.
    # No Admin API access required: checks are performed via regular GET requests.
    # Checked headers: Strict-Transport-Security, X-Content-Type-Options,
    #   X-Frame-Options, Content-Security-Policy, Permissions-Policy.
    # Leaky headers flagged: X-Powered-By, Server (if version-bearing).
    test_6_2:
      # Minimum acceptable max-age in the Strict-Transport-Security header.
      # ASVS V3.4.1 requires max-age >= 31536000 (1 year).
      hsts_min_max_age_seconds: 31536000

      # Number of endpoints to sample for cross-endpoint header consistency check.
      # 0 = all endpoints (complete coverage, slower on large OpenAPI specs).
      # Any positive integer caps the sample using the first N AttackSurface entries.
      endpoint_sample_size: 5