_format_version: "3.0"

upstreams:
  - name: forgejo-upstream
    targets:
      - target: forgejo:3000
        weight: 100
    healthchecks:
      passive:
        type: http
        healthy:
          successes: 2
        unhealthy:
          http_failures: 5
          timeouts: 3
          http_statuses:
            - 500
            - 502
            - 503
            - 504

services:
  - name: forgejo-service
    # Modifica cruciale: url non punta più a forgejo:3000, ma all'upstream
    url: http://forgejo-upstream
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: forgejo-api-route
        paths:
          - /api
        strip_path: false
        preserve_host: false
    plugins:
      #- name: rate-limiting    # rimuovere il plugin per mostrare i finding del rate limiting
      #  config:
      #    minute: 100          # soglia: 100 request al minuto per IP
      #    policy: local        # contatore in RAM, unica opzione in DB-less
      #    limit_by: ip         # chiave = IP TCP reale, non X-Forwarded-For
      #    hide_client_headers: false  # espone X-RateLimit-* e Retry-After
      #    fault_tolerant: true        # se il contatore è irraggiungibile, passa
