_format_version: "3.0"

upstreams:
  - name: forgejo-upstream
    targets:
      - target: forgejo:3000
        weight: 100
    healthchecks:
      passive:
        type: http
        healthy:
          successes: 2
        unhealthy:
          http_failures: 5
          timeouts: 3
          http_statuses:
            - 500
            - 502
            - 503
            - 504

services:
  - name: forgejo-service
    # Modifica cruciale: url non punta più a forgejo:3000, ma all'upstream
    url: http://forgejo-upstream
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: forgejo-api-route
        paths:
          - /api
        strip_path: false
        preserve_host: false
    plugins:
      #- name: rate-limiting    # rimuovere il plugin per mostrare i finding del 4.1 (rate limiting)
      #  config:
      #    minute: 100          # soglia: 100 request al minuto per IP
      #    policy: local        # contatore in RAM, unica opzione in DB-less
      #    limit_by: ip         # chiave = IP TCP reale, non X-Forwarded-For
      #    hide_client_headers: false  # espone X-RateLimit-* e Retry-After
      #    fault_tolerant: true        # se il contatore è irraggiungibile, passa
      - name: response-transformer
        config:
          add:
            headers:
              - "Strict-Transport-Security: max-age=31536000; includeSubDomains"
              - "Content-Security-Policy: default-src 'self'"
              - "Permissions-Policy: geolocation=(), camera=(), microphone=()"
          replace:
            headers:
              - "X-Content-Type-Options: nosniff"
              - "X-Frame-Options: DENY"
          remove:
            headers:
              - "X-Powered-By"

  # ---------------------------------------------------------------------------
  # HTTP → HTTPS redirect service (Test 1.5 sub-test 1)
  #
  # Kong listens on port 8000 (HTTP) and 8443 (HTTPS). In a standard production
  # deployment port 80 must either be closed or return a permanent 301/308
  # redirect to HTTPS. This service replicates that behaviour in the lab:
  # any HTTP request to port 8000 receives a 301 redirect to the HTTPS base URL.
  #
  # The request-termination plugin terminates the request at the Gateway without
  # forwarding to Forgejo, exactly as a production HTTP→HTTPS redirect would.
  # The Location header points to the HTTPS listener (localhost:8443).
  #
  # Test 1.5 is configured with http_probe_url: "http://localhost:8000/" so it
  # probes this service instead of deriving http://localhost:8443/ (which would
  # always return 400 from Kong's TLS listener receiving plaintext HTTP).
  #
  # To produce the FAIL finding (for thesis documentation):
  #   comment out this entire service block and set http_probe_url to ""
  #   in config.yaml → the test derives http://localhost:8443/ → FAIL (400)
  # ---------------------------------------------------------------------------
  - name: http-redirect-service
    # Target is unused: request-termination intercepts all requests before
    # they reach the upstream. An unreachable placeholder is sufficient.
    url: http://forgejo-upstream
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: http-redirect-catch-all
        # Match every path on the HTTP listener (port 8000).
        paths:
          - /
        strip_path: false
        preserve_host: false
        # Restrict to HTTP only: HTTPS traffic on port 8443 must not match
        # this route (Kong routes are protocol-agnostic by path, but the port
        # binding ensures HTTP and HTTPS traffic stays on separate listeners).
        protocols:
          - http
    plugins:
      - name: request-termination
        config:
          status_code: 301
          message: "Moved Permanently"
          # Location header instructs the client to retry over HTTPS.
          # In production replace localhost:8443 with the canonical HTTPS URL.
        # Kong's request-termination does not support custom response headers
        # natively. We chain a response-transformer to inject Location.
      - name: response-transformer
        config:
          add:
            headers:
              - "Location: https://localhost:8443/"
              - "Strict-Transport-Security: max-age=31536000; includeSubDomains"

  # ---------------------------------------------------------------------------
  # Dummy service created exclusively for the Test 3.3 HMAC audit.
  #
  # Purpose: the hmac-auth plugin requires a service/route to be registered,
  # but attaching it to forgejo-service would break all existing tests that
  # use Bearer tokens (Kong would reject them for lacking an HMAC signature).
  # By attaching it to an unreachable path, the plugin is discoverable via
  # GET /plugins (Admin API) without affecting any real traffic.
  #
  # Test 3.3 reads the full plugin list from the Admin API and audits the
  # hmac-auth config regardless of which service it is attached to.
  #
  # To produce FAIL findings (useful for thesis documentation):
  #   set clock_skew: 600         (exceeds 300s oracle -> FAIL)
  #   add hmac-sha1 / hmac-md5 to algorithms (deprecated/broken -> FAIL)
  # ---------------------------------------------------------------------------
  - name: hmac-audit-dummy
    url: http://forgejo-upstream
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: hmac-audit-route
        paths:
          - /hmac-audit-probe-not-a-real-path
        strip_path: false
    plugins:
      - name: hmac-auth
        config:
          clock_skew: 300               # compliant: <= 300 s (NIST SP 800-107 Rev.1 S5.3.2)
          algorithms:
            - hmac-sha256
            - hmac-sha384
            - hmac-sha512
          validate_request_body: true   # body included in signature (recommended for POST/PUT)